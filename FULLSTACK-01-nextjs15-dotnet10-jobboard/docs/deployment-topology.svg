<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="Deployment topology">
  <defs>
    <style>
      .title { font: 700 26px Segoe UI, Arial, sans-serif; fill: #111827; }
      .sub { font: 500 14px Segoe UI, Arial, sans-serif; fill: #374151; }
      .head { font: 700 15px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .txt { font: 500 13px Segoe UI, Arial, sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect width="900" height="420" fill="#f8fafc"/>
  <text x="32" y="42" class="title">Target Deployment Topology</text>
  <text x="32" y="66" class="sub">Containerized services with SQL Server and frontend hosting</text>

  <rect x="36" y="110" width="220" height="120" rx="14" fill="#dbeafe"/>
  <text x="54" y="142" class="head">Vercel</text>
  <text x="54" y="166" class="txt">Next.js frontend</text>
  <text x="54" y="188" class="txt">Public HTTPS endpoint</text>

  <rect x="340" y="95" width="230" height="150" rx="14" fill="#dcfce7"/>
  <text x="358" y="127" class="head">Azure Container Apps</text>
  <text x="358" y="151" class="txt">JobBoard API container</text>
  <text x="358" y="173" class="txt">JWT auth + OpenAPI</text>
  <text x="358" y="195" class="txt">Horizontal scaling ready</text>

  <rect x="650" y="110" width="220" height="120" rx="14" fill="#fee2e2"/>
  <text x="668" y="142" class="head">Azure SQL Database</text>
  <text x="668" y="166" class="txt">Persistent relational store</text>
  <text x="668" y="188" class="txt">EF Core migrations</text>

  <rect x="340" y="286" width="230" height="95" rx="14" fill="#ede9fe"/>
  <text x="358" y="318" class="head">GitHub Actions</text>
  <text x="358" y="342" class="txt">Build, test, quality gates</text>
  <text x="358" y="364" class="txt">Deploy on merge</text>

  <line x1="256" y1="170" x2="340" y2="170" stroke="#334155" stroke-width="2.5"/>
  <line x1="570" y1="170" x2="650" y2="170" stroke="#334155" stroke-width="2.5"/>
  <line x1="455" y1="245" x2="455" y2="286" stroke="#334155" stroke-width="2.5"/>
</svg>
