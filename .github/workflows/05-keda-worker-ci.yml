name: 05 - KEDA Worker CI

on:
  push:
    paths:
      - '05-keda-worker-net10/**'
  pull_request:
    paths:
      - '05-keda-worker-net10/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 05-keda-worker-net10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore KedaWorker.slnx

      - name: Build
        run: dotnet build KedaWorker.slnx --no-restore -c Release

      - name: Test
        run: dotnet test KedaWorker.slnx --no-build -c Release

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: 05-keda-worker-net10

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t keda-order-worker:${{ github.sha }} .
