name: 01 - Clean Architecture CI

on:
  push:
    paths:
      - '01-aspnetcore10-clean-architecture/**'
  pull_request:
    paths:
      - '01-aspnetcore10-clean-architecture/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-aspnetcore10-clean-architecture

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run tests
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clean-arch-test-results
          path: 01-aspnetcore10-clean-architecture/tests/**/test-results.trx

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:
      run:
        working-directory: 01-aspnetcore10-clean-architecture

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t clean-architecture-api:${{ github.sha }} .
